<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating Systems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body
        {
            padding:20px;
            background: #e9e9e9;
            margin:0;
            font-family: Georgia;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:rgb(61, 119, 220);
        }
        .container
        {
            width:500px;
            height:500px;
            margin:20px auto;
            border:10px solid hwb(195 35% 11%);
            outline:1px solid  black;
            outline-offset:0px;
            box-shadow:inset 0 0 0 1px black;
            position:relative;
            background:white;
        }
        .mac
        {
            width:60px;
            top:90px;
            left:80px;
            margin:30px;
        }
        .mac p{
            position:absolute;
            top:185px;
            left:60px;
            color:black;
        }
        .ios-logo
        {
            width:80px;
            position:absolute;
            top:95px;
            left:50%;
            transform:translateX(-50%);    
        }
    .ios-text {
    display:block;
   width:100px;
   position:absolute;
   top:200px;
   left:40%;
}
   .linux
   {
    width:100px;
    position:absolute;
    top:60px;
    right:5%;
   }
   .windows
   {
    width:100px;
    position:absolute;
    bottom:20%;
    left:15%;
   }
   .apk
   {
    width:80px;
    position:absolute;
    bottom:20%;
    right:15%;
   }
   .windowsphone
   {
    width:300px;
    position:absolute;
    bottom:5px;
    left:15%;
   }
   .linuxtext
   {
    width:60px;
    display:block;
    position:absolute;
    top:150px;
    right:30px;
   }

 
    
    </style>
</head>
<body>
    
    <div class="container">
        <h2 class="box-title">Some Common Operating Systems:</h2>
        <div class="mac">
         <img src="logos/macosX.jpg" class="mac">
         <p>Mac OS X</p>
         </div>
         <div class="ios">
            <img src="logos/ios.jpg" class="ios-logo">
            <img src="logos/ioslogotext.png" class="ios-text">
         </div>
         <div class="linux">
            <img src="logos/linux.png" class="linux">
            <img src="logos/linuxtext.png" class="linuxtext">
         </div>
         <div class="windows">
            <img src="logos/windowslogo.png" class="windows">
         </div>
         <div class="apk">
            <img src="logos/apk logo.png" class="apk">
         </div>
         <div class="windowsphone">
            <img src="logos/windowsphone.png" class="windowsphone">
         </div>
    </div>
</body>
</html>
